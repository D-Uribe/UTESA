  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img src="/assets/logo4.png" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-center"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#services">Servicios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="form-title-button" data-aos="fade-down"><h3 class="colabs">Contáctanos</h3></div>
    <div class="container">
      
      <form id="myForm" data-aos="fade-up">
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            id="exampleInputPassword1"
            name="name"
            required
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Asunto</label>
          <input
            type="text"
            class="form-control"
            id="exampleInputPassword1"
            name="title"
            required
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Correo</label>
          <input
            type="email"
            class="form-control"
            name="email"
            id="exampleInputEmail1"
            aria-describedby="emailHelp"
            required
          />
        </div>
        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje</label>
          <textarea
            class="form-control"
            id="mensaje"
            name="message"
            rows="6"
            placeholder="Escriba su mensaje aquí"
            required
          ></textarea>
        </div>
        <div class="form-title-button">
          <button type="submit" class="btn btn-primary" id="submitBtn">Enviar</button>
        </div>
      </form>
    </div>
    <footer
      class=" foot d-flex flex-wrap justify-content-around align-items-center py-3 my-4 border-top"
    >
      <img src="/assets/logo4.png" alt="UTESA" height="60" />
      <div class="text-center">
        <p class="mb-1">📧 ventas@utesamx.com</p>
        <p class="mb-0">📱 +52 442 249 8148</p>
        <a href="https://wa.me/524422498148" target="_blank">
          <i class="bi bi-whatsapp"></i>
        </a>
      </div>
    </footer>

    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="contact.js"></script>
  </body>
</html>
